grafana:
  enabled: true

  admin:
    existingSecret: grafana-admin

  grafana.ini:
    server:
      domain: grafana.opsscope.dev
      root_url: https://grafana.opsscope.dev
      enforce_domain: true

    users:
      allow_sign_up: false

    security:
      cookie_secure: true
      cookie_samesite: lax
      disable_gravatar: true
      allow_embedding: false

  initChownData:
    enabled: false

  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    runAsNonRoot: true

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  persistence:
    enabled: true
    type: pvc
    size: 5Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        memory: 1Gi
        cpu: 200m
      limits:
        memory: 2Gi
        cpu: "1"

alertmanager:
  alertmanagerSpec:
    configSecret: my-alertmanager-config
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m

kube-state-metrics:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m

prometheus-node-exporter:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m

defaultRules:
  create: true