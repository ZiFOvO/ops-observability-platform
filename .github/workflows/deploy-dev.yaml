name: Deploy (dev)

on:
  push:
    branches: ["main"]
    paths:
      - "clusters/dev/**"
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: [self-hosted, linux, x64, k3s]

    steps:
      - uses: actions/checkout@v4

      - name: Verify cluster
        run: kubectl get nodes
      
      - name: Apply Kubernetes manifests (exclude Helm values)
        run: |
          set -euo pipefail
          find clusters/dev -type f -name '*.yaml' \
            ! -path '*/helm-values/*' \
            -print0 | xargs -0 -n1 kubectl apply -f
